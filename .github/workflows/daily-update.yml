name: Daily Stock Data Update

on:
  schedule:
    # Run at 10:30 PM ET (2:30 AM UTC next day) — after US market close
    - cron: '30 2 * * 2-6'  # Tue-Sat UTC = Mon-Fri ET
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run daily update
        run: python scripts/daily_update.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data.json app/static/stock_data.js app/static/forecast_tracking.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily data update: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Cloud Run redeploy
        if: env.GCP_SA_KEY != ''
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" | gcloud auth activate-service-account --key-file=-
          gcloud run deploy media-stocks \
            --source app/ \
            --project na-analytics \
            --region us-central1 \
            --quiet
